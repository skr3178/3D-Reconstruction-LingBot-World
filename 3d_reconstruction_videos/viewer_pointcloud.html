<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Point Cloud — Inside View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #fff; font: 13px monospace;
      background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px;
      pointer-events: none;
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font: 20px monospace;
    }
  </style>
</head>
<body>
  <div id="loading">Loading point cloud...</div>
  <div id="info">
    🖱 Drag to look around &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Double-click to reset
  </div>

  <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.001, 1000);

    // First-person look state
    let yaw = 0, pitch = 0;
    let fov = 90;
    let dragging = false, lastX = 0, lastY = 0;

    // Mouse drag to look around
    renderer.domElement.addEventListener('mousedown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      yaw   -= (e.clientX - lastX) * 0.25;
      pitch -= (e.clientY - lastY) * 0.25;
      pitch = Math.max(-89, Math.min(89, pitch));
      lastX = e.clientX; lastY = e.clientY;
      updateCamera();
    });

    // Touch support
    let lastTouchX = 0, lastTouchY = 0;
    renderer.domElement.addEventListener('touchstart', e => {
      lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
    });
    renderer.domElement.addEventListener('touchmove', e => {
      e.preventDefault();
      yaw   -= (e.touches[0].clientX - lastTouchX) * 0.3;
      pitch -= (e.touches[0].clientY - lastTouchY) * 0.3;
      pitch = Math.max(-89, Math.min(89, pitch));
      lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
      updateCamera();
    }, { passive: false });

    // Scroll to zoom (change FOV)
    window.addEventListener('wheel', e => {
      fov = Math.max(20, Math.min(120, fov + e.deltaY * 0.05));
      camera.fov = fov;
      camera.updateProjectionMatrix();
    });

    // Double-click to reset view
    renderer.domElement.addEventListener('dblclick', () => {
      yaw = 0; pitch = 0; fov = 90;
      camera.fov = fov;
      camera.updateProjectionMatrix();
      updateCamera();
    });

    function updateCamera() {
      const yawRad   = THREE.MathUtils.degToRad(yaw);
      const pitchRad = THREE.MathUtils.degToRad(pitch);
      const dir = new THREE.Vector3(
        Math.sin(yawRad) * Math.cos(pitchRad),
        Math.sin(pitchRad),
        Math.cos(yawRad) * Math.cos(pitchRad)
      );
      camera.lookAt(camera.position.clone().add(dir));
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Load GLB
    const loader = new GLTFLoader();
    loader.load('scene2_pointcloud_vggt_20f_clean.glb', gltf => {
      const obj = gltf.scene;
      scene.add(obj);

      // Compute bounding box and place camera at center
      const box = new THREE.Box3().setFromObject(obj);
      const center = new THREE.Vector3();
      box.getCenter(center);
      camera.position.copy(center);
      updateCamera();

      document.getElementById('loading').style.display = 'none';
      console.log('Loaded. Center:', center);
    }, xhr => {
      document.getElementById('loading').textContent =
        `Loading... ${Math.round(xhr.loaded / xhr.total * 100)}%`;
    }, err => {
      document.getElementById('loading').textContent = 'Error loading file: ' + err;
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
