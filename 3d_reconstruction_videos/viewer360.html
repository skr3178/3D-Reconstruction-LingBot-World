<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Panorama Viewer</title>
  <link rel="stylesheet" href="pannellum/pannellum.css">
  <script src="pannellum/pannellum.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #panorama { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="panorama"></div>
  <script>
    pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: 'output.jpg',
      autoLoad: true,
      showControls: true,
      mouseZoom: true,
      keyboardZoom: true,
      hfov: 100
    });
  </script>
</body>
</html>
